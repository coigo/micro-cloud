syntax = "proto3";

package controller;
option go_module = "github.com/coigo/micro-cloud";

import "google/protobuf/empty.proto";

service StatusReciever {
    rpc shareStatus (ImageStatus) returns (Empty)
}

message ImageStatus {
    string machineId = 1;
    string cpuUsage = 2;
    string ramUsage = 3;
    repeated RunningImage runningImages = 4;
}

message RunningImage {
    string machineId = 1;
    string cpuUsage = 2;
    string ramUsage = 3;
}
